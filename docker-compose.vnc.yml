version: '3.8'

services:
  xstock-vnc:
    build:
      context: .
      dockerfile: Dockerfile.vnc
    container_name: xstock-vnc

    environment:
      - TZ=Asia/Tokyo
      - DISPLAY=:99
      - VNC_PASSWORD=${VNC_PASSWORD}
      - ANTHROPIC_API_KEY
      - XAI_API_KEY

    ports:
      - "6080:6080"  # noVNC (ブラウザからアクセス)

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./output:/app/output
      - ./data:/app/data
      - ./x_profile:/app/x_profile
      - ./core:/app/core:ro
      - ./extensions:/app/extensions:ro
      - ./configs:/app/configs:ro

    shm_size: '2gb'
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
