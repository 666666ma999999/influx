api_version: v1
kind: influx_extension

metadata:
  name: tier3.scheduler
  version: 1.0.0
  tier: tier3_posting
  description: Determines optimal publish timing for news items

runtime:
  entrypoint: "extensions.tier3_posting.scheduler.extension:SchedulerExtension"
  enabled_by_default: true

dependencies:
  requires:
    - "tier3.post_composer>=1.0.0"
  optional: []

hooks:
  subscribes:
    - name: tier3.schedule
      handler: on_schedule
      priority: 100
  emits:
    - schedule.completed

contracts:
  consumes:
    - "influx://contracts/news_item.schema.json"
  produces:
    - "influx://contracts/news_item.schema.json"
