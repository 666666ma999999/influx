api_version: v1
kind: influx_extension

metadata:
  name: tier3.image_generator
  version: 1.0.0
  tier: tier3_posting
  description: X投稿用の画像自動生成（チャート・OGPカード）
  author: influx

runtime:
  entrypoint: "extensions.tier3_posting.image_generator.extension:ImageGeneratorExtension"
  enabled_by_default: false

dependencies:
  requires: []
  optional: []

hooks:
  subscribes:
    - name: tier3.generate_image
      handler: on_generate_image
      priority: 100
  emits:
    - image.generated
    - image.failed

contracts:
  consumes: []
  produces: []

config:
  schema: config_schema.json
