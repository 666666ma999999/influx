api_version: v1
kind: influx_extension

metadata:
  name: tier3.news_curator
  version: 1.0.0
  tier: tier3_posting
  description: Selects and ranks classified tweets for news item composition

runtime:
  entrypoint: "extensions.tier3_posting.news_curator.extension:NewsCuratorExtension"
  enabled_by_default: true

dependencies:
  requires: []
  optional: []

hooks:
  subscribes:
    - name: tier3.curate
      handler: on_curate
      priority: 100
  emits:
    - curation.completed

contracts:
  consumes:
    - "influx://contracts/classification.schema.json"
  produces:
    - "influx://contracts/news_item.schema.json"
