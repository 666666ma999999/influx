api_version: v1
kind: influx_extension

metadata:
  name: tier2.llm_classifier
  version: 1.0.0
  tier: tier2_classification
  description: Claude API based tweet classifier with few-shot learning

runtime:
  entrypoint: "extensions.tier2_classification.llm_classifier.extension:LLMClassifierExtension"
  enabled_by_default: true

dependencies:
  requires: []
  optional:
    - "tier2.keyword_classifier>=1.0.0"

hooks:
  subscribes:
    - name: tier2.classify
      handler: on_classify
      priority: 200
  emits:
    - classification.created

contracts:
  consumes:
    - "influx://contracts/tweet.schema.json"
  produces:
    - "influx://contracts/classification.schema.json"
