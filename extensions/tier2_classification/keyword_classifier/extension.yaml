api_version: v1
kind: influx_extension

metadata:
  name: tier2.keyword_classifier
  version: 1.0.0
  tier: tier2_classification
  description: >
    Keyword and regex based tweet classifier.
    Wraps the existing collector/classifier.py TweetClassifier.

runtime:
  entrypoint: "extensions.tier2_classification.keyword_classifier.extension:KeywordClassifierExtension"
  enabled_by_default: true

dependencies:
  requires: []
  optional: []

hooks:
  subscribes:
    - name: tier2.classify
      handler: on_classify
      priority: 100
  emits:
    - classification.created

contracts:
  consumes:
    - "influx://contracts/tweet.schema.json"
  produces:
    - "influx://contracts/classification.schema.json"
