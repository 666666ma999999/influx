api_version: v1
kind: influx_extension

metadata:
  name: tier2.ensemble_classifier
  version: 1.0.0
  tier: tier2_classification
  description: Meta-learner ensemble combining keyword, LLM, and ML classifiers

runtime:
  entrypoint: "extensions.tier2_classification.ensemble_classifier.extension:EnsembleClassifierExtension"
  enabled_by_default: true

dependencies:
  requires:
    - "tier2.keyword_classifier>=1.0.0"
  optional:
    - "tier2.llm_classifier>=1.0.0"
    - "tier2.ml_classifier>=1.0.0"

hooks:
  subscribes:
    - name: tier2.classify.fusion
      handler: on_classify_fusion
      priority: 500
  emits:
    - classification.created

contracts:
  consumes:
    - "influx://contracts/tweet.schema.json"
    - "influx://contracts/classification.schema.json"
  produces:
    - "influx://contracts/classification.schema.json"
