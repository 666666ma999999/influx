version: '3.8'

# macOS専用設定
# 使用方法: docker-compose -f docker-compose.mac.yml up

services:
  xstock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock

    environment:
      - DISPLAY=host.docker.internal:0
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY
      - XAI_API_KEY

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./output:/app/output
      - ./data:/app/data
      - ./x_profile:/app/x_profile

    stdin_open: true
    tty: true
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
    shm_size: '2gb'

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock-setup

    environment:
      - DISPLAY=host.docker.internal:0
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY
      - XAI_API_KEY

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./x_profile:/app/x_profile

    stdin_open: true
    tty: true
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
    shm_size: '2gb'

    command: python scripts/setup_profile.py

    profiles:
      - setup

  review:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock-review

    environment:
      - TZ=Asia/Tokyo
      - COOKIE_ENCRYPTION_KEY

    volumes:
      - ./scripts:/app/scripts:ro
      - ./extensions:/app/extensions:ro
      - ./core:/app/core:ro
      - ./collector:/app/collector:ro
      - ./output:/app/output
      - ./x_profiles:/app/x_profiles

    ports:
      - "8080:8080"

    command: python -m extensions.tier3_posting.cli.server --port 8080

    profiles:
      - review
