version: '3.8'

# macOS専用設定
# 使用方法: docker-compose -f docker-compose.mac.yml up

services:
  xstock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock

    environment:
      - DISPLAY=host.docker.internal:0
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY
      - XAI_API_KEY

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./output:/app/output
      - ./data:/app/data
      - ./x_profile:/app/x_profile

    stdin_open: true
    tty: true
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
    shm_size: '2gb'

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock-setup

    environment:
      - DISPLAY=host.docker.internal:0
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY
      - XAI_API_KEY

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./x_profile:/app/x_profile

    stdin_open: true
    tty: true
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
    shm_size: '2gb'

    command: python scripts/setup_profile.py

    profiles:
      - setup

  # 2026-05-01 Phase 3: review サービスは tier3_posting リポへ移管
  # 起動: cd ~/Desktop/biz/tier3_posting && python3 -m tier3_posting.cli.server --port 8080
