<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ツイート分類ツール</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
}
a { color: #1d9bf0; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 12px 16px;
  flex-shrink: 0;
}
.header-top {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  flex-wrap: wrap;
}
.header-title {
  font-size: 18px; font-weight: 700;
}
.header-stats {
  font-size: 13px; color: #aaa;
}
.progress-wrap {
  width: 120px; height: 6px;
  background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: #4CAF50; border-radius: 3px;
  transition: width 0.3s ease;
}
.btn-export {
  background: transparent; border: 1px solid #aaa; color: #eee;
  padding: 4px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  white-space: nowrap;
}
.btn-export:hover { background: rgba(255,255,255,0.1); }

/* Board - Kanban */
.board {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
  height: calc(100vh - 60px);
  align-items: flex-start;
}
.board.is-dragging { cursor: grabbing; }
.scroll-hint {
  position: fixed; top: 50%; z-index: 50;
  width: 40px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.1); border-radius: 8px;
  color: rgba(255,255,255,0.5); font-size: 24px;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.scroll-hint.left { left: 8px; transform: translateY(-50%); }
.scroll-hint.right { right: 8px; transform: translateY(-50%); }
.scroll-hint.visible { opacity: 1; }

/* Column */
.column {
  flex: 0 0 280px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  max-height: 100%;
}
.column-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 12px 8px;
  position: sticky;
  top: 0;
  z-index: 1;
}
.column-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.column-title {
  font-size: 14px;
  font-weight: 700;
  color: #eee;
}
.column-count {
  font-size: 12px;
  color: #888;
  margin-left: auto;
}
.column-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
  min-height: 100px;
  transition: background 0.2s, border 0.2s;
  border: 2px solid transparent;
  border-radius: 8px;
}
.column-body::-webkit-scrollbar { width: 4px; }
.column-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* Drag over highlight */
.column-body.drag-over {
  background: rgba(255,255,255,0.08);
  border: 2px dashed rgba(255,255,255,0.3);
  border-radius: 8px;
}

/* Card */
.card {
  position: relative;
  background: #16213e;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: grab;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: box-shadow 0.2s, transform 0.2s;
  user-select: none;
  -webkit-user-select: none;
}
.card:active { cursor: grabbing; }
.card.dragging {
  opacity: 0.5;
  transform: rotate(2deg);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.board.dragging-active .card:not(.dragging) {
  pointer-events: none;
}
.card-username {
  font-size: 12px; font-weight: 600; color: #1d9bf0;
  margin-bottom: 4px;
}
.card-text {
  font-size: 12px; line-height: 1.4; color: #ccc;
  white-space: pre-wrap;
  word-break: break-word;
}
.card-meta {
  font-size: 11px; color: #666; margin-top: 4px;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.card-likes {
  font-size: 11px; color: #aaa; white-space: nowrap;
}
.card-badges {
  display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px;
}
.badge {
  font-size: 0.65rem; padding: 1px 6px; border-radius: 8px;
  color: #fff; white-space: nowrap;
}
.badge-none {
  background: #555;
}

/* Trash button on card */
.card-trash-btn {
  position: absolute;
  top: 6px; right: 6px;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #888;
  font-size: 13px;
  line-height: 22px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  padding: 0;
  z-index: 2;
}
.card-trash-btn:hover {
  background: #c62828;
  color: #fff;
}
.card-restore-btn:hover {
  background: #2e7d32;
  color: #fff;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: #16213e;
  border-radius: 16px;
  padding: 20px;
  max-width: 520px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
.modal-close {
  float: right;
  background: transparent; border: none; color: #aaa;
  font-size: 18px; cursor: pointer; padding: 0 4px;
}
.modal-close:hover { color: #fff; }
.modal-username {
  font-size: 15px; font-weight: 600;
}
.modal-meta {
  font-size: 12px; color: #aaa; margin-top: 4px;
}
.modal-contrarian {
  font-size: 12px; color: #FF5722; margin-top: 4px;
}
.modal-text {
  font-size: 13px; line-height: 1.6; color: #ddd;
  white-space: pre-wrap; word-break: break-word;
  margin: 12px 0;
  max-height: 240px; overflow-y: auto;
}
.modal-text::-webkit-scrollbar { width: 4px; }
.modal-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

/* Category chips */
.chips-area {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0;
}
.chip {
  padding: 5px 12px; border-radius: 8px; font-size: 12px;
  cursor: pointer; transition: all 0.15s;
  border: 2px solid; user-select: none;
  -webkit-user-select: none;
}
.chip.off {
  background: transparent;
}
.chip.on {
  color: #fff;
}

/* Reference info */
.card-ref {
  font-size: 11px; color: #666; margin-top: 8px;
}

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: #666;
  font-size: 15px;
}

/* Column empty */
.column-empty {
  padding: 16px 8px;
  color: #555;
  font-size: 12px;
  text-align: center;
}
</style>
</head>

function loadAnnotations() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) annotations = JSON.parse(raw);
  } catch(e) { annotations = {}; }
}

function saveAnnotations() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
  } catch(e) {}
}

function getAnnotation(url) {
  return annotations[url] || null;
}

function setAnnotation(url, cats, isNone) {
  annotations[url] = {
    human_categories: cats.slice(),
    is_none: !!isNone,
    annotated_at: new Date().toISOString()
  };
  saveAnnotations();
}

function isAnnotated(url) {
  return !!annotations[url];
}

function getHumanCategories(url) {
  var a = annotations[url];
  if (!a) return [];
  return a.human_categories || [];
}

function getIsNone(url) {
  var a = annotations[url];
  if (!a) return false;
  return !!a.is_none;
}

function truncateText(text, maxLen) {
  if (!text) return "";
  if (text.length <= maxLen) return text;
  return text.substring(0, maxLen) + "...";
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  try {
    var d = new Date(dateStr);
    var y = d.getFullYear();
    var m = ("0" + (d.getMonth()+1)).slice(-2);
    var day = ("0" + d.getDate()).slice(-2);
    return y + "-" + m + "-" + day;
  } catch(e) { return ""; }
}

function getCategoryColor(key) {
  for (var i = 0; i < CATEGORIES.length; i++) {

}

function getCategoryShort(key) {
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].key === key) return CATEGORIES[i].short;

  return key;
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function categorizeTweets() {
  var sections = {};
  SECTION_DEFS.forEach(function(sec) {
    sections[sec.key] = [];
  });

  EMBEDDED_DATA.forEach(function(tw) {
    var annotated = isAnnotated(tw.url);
    if (!annotated) {
      sections["unannotated"].push(tw);
      return;
    }
    var a = getAnnotation(tw.url);
    if (a && (a.is_trash || a.is_none)) {
      sections[TRASH_KEY].push(tw);
      return;
    }
    var cats = getHumanCategories(tw.url);
    if (cats.length === 0) {
      sections["unannotated"].push(tw);
      return;
    }
    cats.forEach(function(catKey) {
      if (sections[catKey]) {
        sections[catKey].push(tw);
      }
    });
  });

  return sections;
}

// --- Badges HTML ---
function buildBadgesHTML(url) {
  var cats = getHumanCategories(url);
  var isNone = getIsNone(url);
  if (isNone) {
    return '<span class="badge badge-none">対象外</span>';
  }
  if (cats.length === 0) return "";
  var html = "";
  cats.forEach(function(key) {
    html += '<span class="badge" style="background:' + getCategoryColor(key) + '">' + getCategoryShort(key) + '</span>';
  });
  return html;
}

// --- Build card HTML ---
function buildCardHTML(tweet, sectionKey) {
  var likes = (tweet.like_count != null) ? ("&#9829; " + tweet.like_count) : "";
  var textPreview = escapeHtml(tweet.text || "");
  var badgesHTML = buildBadgesHTML(tweet.url);
  var isInTrash = sectionKey === TRASH_KEY;
  var actionBtn = isInTrash
    ? '<button class="card-trash-btn card-restore-btn" title="復元">&#8617;</button>'
    : '<button class="card-trash-btn" title="対象外へ">&#10005;</button>';

  return actionBtn +
    '<div class="card-header">' +
    '<span class="card-username">@' + escapeHtml(tweet.username) + '</span>' +
    '<span class="card-likes">' + likes + '</span>' +
    '</div>' +
    '<div class="card-text">' + textPreview + '</div>' +
    (badgesHTML ? '<div class="card-badges">' + badgesHTML + '</div>' : '') +
    '<div class="card-meta">' + formatDate(tweet.posted_at) + '</div>';
}

// --- Create draggable card ---
function createCard(tweet, sectionKey) {
  var card = document.createElement("div");
  card.className = "card";
  card.setAttribute("data-url", tweet.url);
  card.setAttribute("draggable", "true");
  card.innerHTML = buildCardHTML(tweet, sectionKey);

  // Track drag state for click vs drag detection
  var didDrag = false;

  card.addEventListener("dragstart", function(e) {
    e.dataTransfer.setData("text/plain", tweet.url);
    e.dataTransfer.effectAllowed = "move";
    card.classList.add("dragging");
    document.getElementById("board").classList.add("dragging-active");
    draggedUrl = tweet.url;
    dragSourceSection = sectionKey;
    didDrag = true;
  });

  card.addEventListener("dragend", function(e) {
    card.classList.remove("dragging");
    document.getElementById("board").classList.remove("dragging-active");
    stopAutoScroll();
    draggedUrl = null;
    dragSourceSection = null;
  });

  // Trash / Restore button
  var trashBtn = card.querySelector(".card-trash-btn");
  if (trashBtn) {
    trashBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      if (sectionKey === TRASH_KEY) {
        // Restore: delete annotation → back to unannotated
        delete annotations[tweet.url];
        saveAnnotations();
        updateHeader();
        renderAllColumns();
      } else {
        moveToColumn(tweet.url, TRASH_KEY, sectionKey);
      }
    });
  }

  card.addEventListener("click", function(e) {
    if (didDrag) {
      didDrag = false;
      return;
    }
    if (e.target.closest(".card-trash-btn")) return;
    openModal(tweet);
  });

  // Reset didDrag on mousedown for next interaction
  card.addEventListener("mousedown", function() {
    didDrag = false;
  });

  return card;
}

// --- Render all columns ---
function renderAllColumns() {
  var board = document.getElementById("board");
  board.innerHTML = "";

  var sections = categorizeTweets();

  SECTION_DEFS.forEach(function(secDef) {
    var tweets = sections[secDef.key] || [];

    var column = document.createElement("div");
    column.className = "column";
    column.setAttribute("data-section", secDef.key);

    // Column header
    var header = document.createElement("div");
    header.className = "column-header";

    var dot = document.createElement("span");
    dot.className = "column-dot";
    dot.style.backgroundColor = secDef.color;
    header.appendChild(dot);

    var title = document.createElement("span");
    title.className = "column-title";
    title.textContent = secDef.label;
    header.appendChild(title);

    var count = document.createElement("span");
    count.className = "column-count";
    count.textContent = tweets.length;
    header.appendChild(count);

    column.appendChild(header);

    // Column body (drop zone)
    var body = document.createElement("div");
    body.className = "column-body";

    // Drop zone events
    (function(columnBody, sectionKey) {
      columnBody.addEventListener("dragover", function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        columnBody.classList.add("drag-over");
      });
      columnBody.addEventListener("dragleave", function(e) {
        // Only remove if actually leaving the column body
        if (!columnBody.contains(e.relatedTarget)) {
          columnBody.classList.remove("drag-over");
        }
      });
      columnBody.addEventListener("drop", function(e) {
        e.preventDefault();
        columnBody.classList.remove("drag-over");
        var url = e.dataTransfer.getData("text/plain") || draggedUrl;
        if (url) {
          moveToColumn(url, sectionKey, dragSourceSection);
        }
      });
    })(body, secDef.key);

    if (tweets.length === 0) {
      var emptyMsg = document.createElement("div");
      emptyMsg.className = "column-empty";
      emptyMsg.textContent = "ドロップして追加";
      body.appendChild(emptyMsg);
    } else {
      tweets.forEach(function(tw) {
        body.appendChild(createCard(tw, secDef.key));
      });
    }

    column.appendChild(body);
    board.appendChild(column);
  });

  // Show empty state if no data at all
  var emptyState = document.getElementById("emptyState");
  emptyState.style.display = EMBEDDED_DATA.length === 0 ? "block" : "none";
}

// --- Auto-scroll during drag ---
var autoScrollInterval = null;
var autoScrollSpeed = 0;

function startAutoScroll() {
  if (autoScrollInterval) return;
  var board = document.getElementById('board');
  autoScrollInterval = setInterval(function() {
    if (autoScrollSpeed !== 0) {
      board.scrollLeft += autoScrollSpeed;
    }
  }, 16);
}

function stopAutoScroll() {
  if (autoScrollInterval) {
    clearInterval(autoScrollInterval);
    autoScrollInterval = null;
  }
  autoScrollSpeed = 0;
  if (typeof hintLeft !== 'undefined') hintLeft.classList.remove('visible');
  if (typeof hintRight !== 'undefined') hintRight.classList.remove('visible');
}

// --- Scroll hint arrows ---
var hintLeft = document.createElement('div');
hintLeft.className = 'scroll-hint left';
hintLeft.innerHTML = '&#9664;';
document.body.appendChild(hintLeft);

var hintRight = document.createElement('div');
hintRight.className = 'scroll-hint right';
hintRight.innerHTML = '&#9654;';
document.body.appendChild(hintRight);

// --- Board-level dragover for auto-scroll ---
document.getElementById('board').addEventListener('dragover', function(e) {
  var board = this;
  var rect = board.getBoundingClientRect();
  var edgeZone = 80;
  var maxSpeed = 15;
  var mouseX = e.clientX;

  if (mouseX < rect.left + edgeZone) {
    var proximity = 1 - (mouseX - rect.left) / edgeZone;
    autoScrollSpeed = -maxSpeed * Math.max(0, Math.min(1, proximity));
    startAutoScroll();
    hintLeft.classList.add('visible');
    hintRight.classList.remove('visible');
  } else if (mouseX > rect.right - edgeZone) {
    var proximity = 1 - (rect.right - mouseX) / edgeZone;
    autoScrollSpeed = maxSpeed * Math.max(0, Math.min(1, proximity));
    startAutoScroll();
    hintRight.classList.add('visible');
    hintLeft.classList.remove('visible');
  } else {
    autoScrollSpeed = 0;
    hintLeft.classList.remove('visible');
    hintRight.classList.remove('visible');
  }
});

// --- Drag & Drop: move tweet to column ---
function moveToColumn(url, targetSectionKey, fromSection) {
  if (targetSectionKey === "unannotated") {
    delete annotations[url];
  } else if (targetSectionKey === TRASH_KEY) {
    annotations[url] = {
      human_categories: [],
      is_none: false,
      is_trash: true,
      annotated_at: new Date().toISOString()
    };
  } else {
    var cats = getHumanCategories(url).slice();
    // Remove from source category if moving between categories
    if (fromSection && fromSection !== "unannotated" && fromSection !== TRASH_KEY) {
      var idx = cats.indexOf(fromSection);
      if (idx >= 0) {
        cats.splice(idx, 1);
      }
    }
    // Add target category
    if (cats.indexOf(targetSectionKey) < 0) {
      cats.push(targetSectionKey);
    }
    annotations[url] = {
      human_categories: cats,
      is_none: false,
      is_trash: false,
      annotated_at: new Date().toISOString()
    };
  }
  saveAnnotations();
  updateHeader();
  renderAllColumns();
}

// --- Modal ---
function openModal(tweet) {
  var container = document.getElementById("modalContainer");
  container.innerHTML = "";

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.addEventListener("click", function(e) {
    if (e.target === overlay) closeModal();
  });

  var modal = document.createElement("div");
  modal.className = "modal";
  modal.innerHTML = buildModalHTML(tweet);
  overlay.appendChild(modal);
  container.appendChild(overlay);

  // Wire up close button
  var closeBtn = modal.querySelector(".modal-close");
  if (closeBtn) {
    closeBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      closeModal();
    });
  }

  // Wire up chips
  var chips = modal.querySelectorAll(".chip");
  chips.forEach(function(chip) {
    chip.addEventListener("click", function(e) {
      e.stopPropagation();
      handleModalChipClick(tweet.url, chip, modal);
    });
  });
}

function closeModal() {
  var container = document.getElementById("modalContainer");
  container.innerHTML = "";
  updateHeader();
  renderAllColumns();
}

function buildModalHTML(tweet) {
  var displayName = escapeHtml(tweet.display_name || "");
  var username = escapeHtml(tweet.username || "");
  var dateStr = formatDate(tweet.posted_at);
  var likes = (tweet.like_count != null) ? ("&#9829; " + tweet.like_count) : "";
  var contrarianHTML = tweet.is_contrarian ? '<div class="modal-contrarian">&#128260; 逆指標</div>' : "";
  var fullText = escapeHtml(tweet.text || "");

  var cats = getHumanCategories(tweet.url);
  var isNone = getIsNone(tweet.url);

  var chipsHTML = "";
  CATEGORIES.forEach(function(c) {
    var isOn = cats.indexOf(c.key) >= 0;
    chipsHTML += '<span class="chip ' + (isOn ? "on" : "off") + '" data-cat="' + c.key + '" ' +
      'style="border-color:' + c.color + ';' +
      (isOn ? 'background:' + c.color + ';color:#fff;' : 'color:' + c.color + ';') +
      '">' + c.short + '</span>';
  });
  // Trash chip (対象外)
  var a = getAnnotation(tweet.url);
  var isTrash = a && (a.is_trash || a.is_none);
  chipsHTML += '<span class="chip ' + (isTrash ? "on" : "off") + '" data-cat="' + TRASH_KEY + '" ' +
    'style="border-color:#555;' +
    (isTrash ? 'background:#555;color:#fff;' : 'color:#888;') +
    '">対象外</span>';

  // Reference info
  var kwCats = tweet.categories || [];
  var llmCats = tweet.llm_categories || [];
  var refHTML = '<div class="card-ref">KW: [' + kwCats.map(getCategoryShort).join(", ") + ']</div>' +
    '<div class="card-ref">LLM: [' + llmCats.map(getCategoryShort).join(", ") + ']</div>';

  return '<button class="modal-close">&#10005; 閉じる</button>' +
    '<div class="modal-username">' + displayName + ' <span style="color:#1d9bf0;font-weight:400;font-size:13px;">@' + username + '</span></div>' +
    '<div class="modal-meta">' + dateStr + '  ' + likes + '</div>' +
    contrarianHTML +
    '<div class="modal-text">' + fullText + '</div>' +
    '<div class="chips-area">' + chipsHTML + '</div>' +
    refHTML;
}

function handleModalChipClick(url, chipEl, modalEl) {
  var catKey = chipEl.getAttribute("data-cat");
  var cats = getHumanCategories(url).slice();
  var isNone = getIsNone(url);

  if (catKey === TRASH_KEY) {
    // Toggle trash
    var a = getAnnotation(url);
    var wasTrash = a && a.is_trash;
    if (wasTrash) {
      // Untrash → back to unannotated
      delete annotations[url];
      saveAnnotations();
    } else {
      // Trash it
      annotations[url] = {
        human_categories: [],
        is_none: false,
        is_trash: true,
        annotated_at: new Date().toISOString()
      };
      saveAnnotations();
    }
  } else {
    var idx = cats.indexOf(catKey);
    if (idx >= 0) {
      cats.splice(idx, 1);
    } else {
      cats.push(catKey);
    }
    setAnnotation(url, cats, false);
  }

  // Re-render chips in modal
  refreshModalChips(url, modalEl);
  updateHeader();
}

function refreshModalChips(url, modalEl) {
  var cats = getHumanCategories(url);
  var isNone = getIsNone(url);
  var a = getAnnotation(url);
  var isTrash = a && (a.is_trash || a.is_none);
  var chips = modalEl.querySelectorAll(".chip");
  chips.forEach(function(chip) {
    var key = chip.getAttribute("data-cat");
    var isOn = false;
    if (key === TRASH_KEY) {
      isOn = isTrash;
      chip.style.borderColor = "#555";
      if (isOn) {
        chip.style.background = "#555";
        chip.style.color = "#fff";
        chip.className = "chip on";
      } else {
        chip.style.background = "transparent";
        chip.style.color = "#888";
        chip.className = "chip off";
      }
    } else {
      isOn = cats.indexOf(key) >= 0;
      var color = getCategoryColor(key);
      chip.style.borderColor = color;
      if (isOn) {
        chip.style.background = color;
        chip.style.color = "#fff";
        chip.className = "chip on";
      } else {
        chip.style.background = "transparent";
        chip.style.color = color;
        chip.className = "chip off";
      }
    }
  });
}

// --- Export ---
function exportAnnotations() {
  var total = EMBEDDED_DATA.length;
  var annotated = 0;
  EMBEDDED_DATA.forEach(function(tw) { if (isAnnotated(tw.url)) annotated++; });
  var unannotated = total - annotated;

  var msg = "分類済み: " + annotated + "/" + total + " 件\n未分類: " + unannotated + " 件\n\nエクスポートしますか？";
  if (!confirm(msg)) return;

  var annList = [];
  EMBEDDED_DATA.forEach(function(tw) {
    var a = getAnnotation(tw.url);
    if (a) {
      annList.push({
        url: tw.url,
        human_categories: (a.is_trash || a.is_none) ? [] : (a.human_categories || []),
        annotated_at: a.annotated_at || ""
      });
    }
  });

  var output = {
    annotator: "human",
    created_at: new Date().toISOString(),
    version: "1.0",
    total: total,
    annotated: annotated,
    annotations: annList
  };

  var blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  var now = new Date();
  var dateStr = now.getFullYear() +
    ("0" + (now.getMonth()+1)).slice(-2) +
    ("0" + now.getDate()).slice(-2);
  a.href = url;
  a.download = "human_annotations_" + dateStr + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- Import ---
function importAnnotations(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var annList = data.annotations || [];
      var imported = 0;
      annList.forEach(function(a) {
        var url = a.url;
        if (!url) return;
        var cats = a.human_categories || [];
        annotations[url] = {
          human_categories: cats,
          is_none: false,
          is_trash: cats.length === 0,
          annotated_at: a.annotated_at || new Date().toISOString()
        };
        imported++;
      });
      saveAnnotations();
      updateHeader();
      renderAllColumns();
      alert("インポート完了: " + imported + "件の分類データを復元しました");
    } catch(err) {
      alert("インポートエラー: " + err.message);
    }
    event.target.value = "";
  };
  reader.readAsText(file);
}

// --- Init ---
function prefillFromExisting() {
  var count = 0;
  EMBEDDED_DATA.forEach(function(tw) {
    if (annotations[tw.url]) return;
    var llm = tw.llm_categories || [];
    var kw = tw.categories || [];
    var cats = llm.length > 0 ? llm : kw;
    if (cats.length > 0) {
      annotations[tw.url] = {
        human_categories: cats.slice(),
        is_none: false,
        annotated_at: new Date().toISOString()
      };
      count++;
    }
  });
  if (count > 0) saveAnnotations();
}

function init() {
  loadAnnotations();

  if (EMBEDDED_DATA.length === 0) {
    document.getElementById("emptyState").style.display = "block";
    document.getElementById("emptyState").textContent = "データが埋め込まれていません。collect_tweets.py で収集してください。";
    updateHeader();
    return;
  }

  prefillFromExisting();
  updateHeader();
  renderAllColumns();
}

init();
</script>
