<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Stock Collector</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: #000;
  color: #e7e9ea;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.3125;
  min-height: 100vh;
}
a { color: #1d9bf0; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.container { max-width: 600px; margin: 0 auto; border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; min-height: 100vh; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #2f3336;
  padding: 12px 16px 0;
}
.header-title {
  font-size: 20px; font-weight: 700; padding-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.header-title svg { width: 24px; height: 24px; fill: #e7e9ea; }
.header-meta { font-size: 13px; color: #71767b; font-weight: 400; margin-left: auto; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid #2f3336; }
.tab {
  flex: 1; text-align: center; padding: 14px 0; font-size: 15px; font-weight: 500;
  color: #71767b; cursor: pointer; position: relative; transition: background 0.2s;
  border: none; background: none;
}
.tab:hover { background: rgba(231,233,234,0.06); }
.tab.active { color: #e7e9ea; font-weight: 700; }
.tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 56px; height: 4px; background: #1d9bf0; border-radius: 2px;
}

/* Sort bar */
.sort-bar {
  display: flex; align-items: center; gap: 4px; padding: 8px 16px;
  border-bottom: 1px solid #2f3336; font-size: 13px; color: #71767b;
}
.sort-btn {
  background: none; border: 1px solid #2f3336; border-radius: 9999px;
  color: #71767b; padding: 4px 12px; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.sort-btn:hover { background: rgba(231,233,234,0.06); }
.sort-btn.active { background: #1d9bf0; color: #fff; border-color: #1d9bf0; }

/* Tweet card */
.tweet {
  display: flex; gap: 12px; padding: 12px 16px;
  border-bottom: 1px solid #2f3336; transition: background 0.2s; cursor: pointer;
}
.tweet:hover { background: rgba(231,233,234,0.03); }
.avatar {
  width: 40px; height: 40px; border-radius: 50%; background: #333639;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #1d9bf0; flex-shrink: 0;
}
.tweet-body { flex: 1; min-width: 0; }
.tweet-header { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.display-name { font-weight: 700; font-size: 15px; color: #e7e9ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.username { color: #71767b; font-size: 15px; white-space: nowrap; }
.dot { color: #71767b; font-size: 15px; }
.timestamp { color: #71767b; font-size: 15px; white-space: nowrap; }
.tweet-text { margin-top: 4px; font-size: 15px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
.tweet-text a { color: #1d9bf0; }

/* Group badge */
.group-badge {
  font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-left: auto;
  white-space: nowrap; font-weight: 500;
}
.group-badge.group1 { background: rgba(29,155,240,0.15); color: #1d9bf0; }
.group-badge.group2 { background: rgba(0,186,124,0.15); color: #00ba7c; }
.group-badge.group3 { background: rgba(249,24,128,0.15); color: #f91880; }

/* Contrarian badge */
.contrarian-badge {
  font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-left: 4px;
  background: rgba(255,212,0,0.15); color: #ffd400; font-weight: 500; white-space: nowrap;
}

/* Engagement */
.engagement { display: flex; margin-top: 12px; gap: 0; max-width: 360px; }
.eng-btn {
  display: flex; align-items: center; gap: 4px; flex: 1;
  color: #71767b; font-size: 13px; background: none; border: none; cursor: pointer;
  padding: 2px 0; border-radius: 9999px; transition: color 0.2s;
}
.eng-btn svg { width: 18px; height: 18px; fill: currentColor; transition: color 0.2s; }
.eng-btn.reply:hover { color: #1d9bf0; }
.eng-btn.retweet:hover { color: #00ba7c; }
.eng-btn.like:hover { color: #f91880; }

/* Loading / Empty */
.loading, .empty {
  text-align: center; padding: 40px 16px; color: #71767b; font-size: 15px;
}
.spinner {
  width: 28px; height: 28px; border: 3px solid #2f3336; border-top-color: #1d9bf0;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Category filter */
.category-tabs {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 16px;
  border-bottom: 1px solid #2f3336;
}
.cat-btn {
  background: none; border: 1px solid #2f3336; border-radius: 9999px;
  color: #71767b; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.cat-btn:hover { background: rgba(231,233,234,0.06); }
.cat-btn.active { background: #1d9bf0; color: #fff; border-color: #1d9bf0; }

/* Category badge on tweets */
.cat-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.cat-badge {
  font-size: 11px; padding: 1px 6px; border-radius: 4px; font-weight: 500; white-space: nowrap;
}
.cat-badge.recommended_assets { background: rgba(29,155,240,0.15); color: #1d9bf0; }
.cat-badge.purchased_assets { background: rgba(0,186,124,0.15); color: #00ba7c; }
.cat-badge.ipo { background: rgba(120,86,255,0.15); color: #7856ff; }
.cat-badge.market_trend { background: rgba(255,122,0,0.15); color: #ff7a00; }
.cat-badge.bullish_assets { background: rgba(0,200,83,0.15); color: #00c853; }
.cat-badge.bearish_assets { background: rgba(249,24,128,0.15); color: #f91880; }
.cat-badge.warning_signals { background: rgba(255,212,0,0.15); color: #ffd400; }

/* Annotation buttons */
.ann-section { border-top: 1px solid #2f3336; margin-top: 8px; padding-top: 8px; }
.ann-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.ann-row:last-child { margin-bottom: 0; }
.ann-btn {
  font-size: 13px; padding: 4px 10px; border-radius: 9999px; cursor: pointer;
  background: none; font-weight: 500; white-space: nowrap; transition: all 0.15s;
  line-height: 1.4; user-select: none;
}
.ann-btn.recommended_assets { border: 1px solid #1d9bf0; color: #1d9bf0; }
.ann-btn.purchased_assets { border: 1px solid #00ba7c; color: #00ba7c; }
.ann-btn.ipo { border: 1px solid #7856ff; color: #7856ff; }
.ann-btn.market_trend { border: 1px solid #ff7a00; color: #ff7a00; }
.ann-btn.bullish_assets { border: 1px solid #00c853; color: #00c853; }
.ann-btn.bearish_assets { border: 1px solid #f91880; color: #f91880; }
.ann-btn.warning_signals { border: 1px solid #ffd400; color: #ffd400; }
.ann-btn.selected.recommended_assets { background: rgba(29,155,240,0.25); }
.ann-btn.selected.purchased_assets { background: rgba(0,186,124,0.25); }
.ann-btn.selected.ipo { background: rgba(120,86,255,0.25); }
.ann-btn.selected.market_trend { background: rgba(255,122,0,0.25); }
.ann-btn.selected.bullish_assets { background: rgba(0,200,83,0.25); }
.ann-btn.selected.bearish_assets { background: rgba(249,24,128,0.25); }
.ann-btn.selected.warning_signals { background: rgba(255,212,0,0.25); }
.ann-btn:hover:not(.selected) { background: rgba(231,233,234,0.06); }
.tweet.ann-focused { outline: 1px solid #1d9bf0; outline-offset: -1px; }
.shortcut-hint { font-size: 9px; opacity: 0; margin-right: 2px; transition: opacity 0.15s; }
.tweet.ann-focused .shortcut-hint { opacity: 0.6; }
.ann-footer {
  position: sticky; bottom: 0; z-index: 10;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid #2f3336; padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.ann-stats { font-size: 13px; color: #71767b; }
.ann-export-btn {
  background: #1d9bf0; color: #fff; border: none; border-radius: 9999px;
  padding: 6px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background 0.2s;
}
.ann-export-btn:hover { background: #1a8cd8; }
.ann-progress-wrap { flex: 1; margin: 0 12px; }
.ann-progress-bar { height: 4px; background: #2f3336; border-radius: 2px; overflow: hidden; }
.ann-progress-fill { height: 100%; background: #1d9bf0; border-radius: 2px; transition: width 0.3s; width: 0%; }
.shortcut-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
}
.shortcut-overlay.visible { display: flex; }
.shortcut-card {
  background: #16181c; border: 1px solid #2f3336; border-radius: 12px;
  padding: 24px; max-width: 360px; width: 90%;
}
.shortcut-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; color: #e7e9ea; }
.shortcut-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #2f3336; }
.shortcut-row:last-child { border-bottom: none; }
.shortcut-key { background: #2f3336; color: #e7e9ea; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 13px; }
.shortcut-desc { color: #71767b; }

/* Responsive */
@media (max-width: 600px) {
  .container { border-left: none; border-right: none; }
  .display-name { max-width: 140px; }
}
</style>
</head>

</div>

</div>

const ANN_STORAGE_KEY = 'human_annotations_v1';
let annData = {};
let focusedTweetUrl = null;

function loadAnnData() {
  try {
    const raw = localStorage.getItem(ANN_STORAGE_KEY);
    annData = raw ? JSON.parse(raw) : {};
  } catch(e) { annData = {}; }
}

function saveAnnData() {
  localStorage.setItem(ANN_STORAGE_KEY, JSON.stringify(annData));
}

function getAnnCategories(url) {
  return annData[url] ? (annData[url].human_categories || []) : [];
}

function toggleAnnCategory(url, catKey) {
  if (!annData[url]) {
    annData[url] = { human_categories: [], is_none: false, annotated_at: new Date().toISOString() };
  }
  const cats = annData[url].human_categories;
  const idx = cats.indexOf(catKey);
  if (idx >= 0) { cats.splice(idx, 1); } else { cats.push(catKey); }
  annData[url].is_none = cats.length === 0;
  annData[url].annotated_at = new Date().toISOString();
  saveAnnData();
  updateAnnStats();
}

function clearAllAnn(url) {
  if (annData[url]) {
    annData[url].human_categories = [];
    annData[url].is_none = true;
    annData[url].annotated_at = new Date().toISOString();
    saveAnnData();
    updateAnnStats();
  }
}

function formatDate(iso) {
  const d = new Date(iso);
  const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const m = jst.getUTCMonth() + 1;
  const day = jst.getUTCDate();
  const h = String(jst.getUTCHours()).padStart(2, '0');
  const min = String(jst.getUTCMinutes()).padStart(2, '0');
  return `${m}月${day}日 ${h}:${min}`;
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function renderTweet(t) {
  const initial = (t.display_name || t.username)[0].toUpperCase();
  const groupClass = t.group || '';
  const groupLabel = t.group_name || t.group || '';
  const contrarian = t.is_contrarian ? '<span class="contrarian-badge">逆張り</span>' : '';
  return `<div class="tweet" data-tweet-url="${t.url}">
  <div class="avatar">${initial}</div>
  <div class="tweet-body">
    <div class="tweet-header">
      <span class="display-name">${escHtml(t.display_name)}</span>
      <span class="username">@${escHtml(t.username)}</span>
      <span class="dot">·</span>
      <span class="timestamp">${formatDate(t.posted_at)}</span>
      <span class="group-badge ${groupClass}">${escHtml(groupLabel)}</span>
      ${contrarian}
    </div>
    <div class="tweet-text">${linkify(escHtml(t.text))}</div>
    <div class="cat-badges">${(t.llm_categories || t.categories || []).map(c => {
      const names = {recommended_assets:'オススメ資産',purchased_assets:'購入資産',ipo:'IPO',market_trend:'市況',bullish_assets:'高騰',bearish_assets:'下落',warning_signals:'警戒'};
      return '<span class="cat-badge '+c+'">'+(names[c]||c)+'</span>';
    }).join('')}</div>
    <div class="ann-section">
      <div class="ann-row">
        ${ANN_CATEGORIES.slice(0,4).map(c => {
          const sel = getAnnCategories(t.url).includes(c.key);
          return '<button class="ann-btn '+c.key+(sel?' selected':'')+'" data-cat-key="'+c.key+'"><span class="shortcut-hint">'+c.num+'</span>'+(sel?'✓ ':'')+c.label+'</button>';
        }).join('')}
      </div>
      <div class="ann-row">
        ${ANN_CATEGORIES.slice(4).map(c => {
          const sel = getAnnCategories(t.url).includes(c.key);
          return '<button class="ann-btn '+c.key+(sel?' selected':'')+'" data-cat-key="'+c.key+'"><span class="shortcut-hint">'+c.num+'</span>'+(sel?'✓ ':'')+c.label+'</button>';
        }).join('')}
      </div>
    </div>
    <div class="engagement">
      <button class="eng-btn reply">${svgReply}<span>${formatNum(t.reply_count||0)}</span></button>
      <button class="eng-btn retweet">${svgRetweet}<span>${formatNum(t.retweet_count||0)}</span></button>
      <button class="eng-btn like">${svgLike}<span>${formatNum(t.like_count||0)}</span></button>
    </div>
  </div>
</div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  let filtered = currentGroup === 'all' ? allTweets : allTweets.filter(t => t.group === currentGroup);
  if (currentCategory !== 'all') {
    if (currentCategory === 'none') {
      filtered = filtered.filter(t => !(t.llm_categories || t.categories || []).length);
    } else {
      filtered = filtered.filter(t => (t.llm_categories || t.categories || []).includes(currentCategory));
    }
  }
  const sorters = {
    time: (a, b) => new Date(b.posted_at) - new Date(a.posted_at),
    likes: (a, b) => (b.like_count||0) - (a.like_count||0),
    replies: (a, b) => (b.reply_count||0) - (a.reply_count||0),
    retweets: (a, b) => (b.retweet_count||0) - (a.retweet_count||0),
  };
  filtered.sort(sorters[currentSort]);
  document.getElementById('tweet-count').textContent = `${filtered.length}件のポスト`;
  const tl = document.getElementById('timeline');
  if (filtered.length === 0) {
    tl.innerHTML = '<div class="empty">ポストが見つかりません</div>';
  } else {
    tl.innerHTML = filtered.map(renderTweet).join('');
  }
}

// Annotation: event delegation on timeline
document.getElementById('timeline').addEventListener('click', function(e) {
  const annBtn = e.target.closest('.ann-btn');
  if (annBtn) {
    e.stopPropagation();
    const tweetEl = annBtn.closest('.tweet');
    const url = tweetEl ? tweetEl.dataset.tweetUrl : null;
    if (!url) return;
    const catKey = annBtn.dataset.catKey;
    toggleAnnCategory(url, catKey);
    // DOM minimal update: update all ann-btns for this tweet
    const section = tweetEl.querySelector('.ann-section');
    if (section) {
      section.querySelectorAll('.ann-btn').forEach(btn => {
        updateAnnButton(btn, url);
      });
    }
    return;
  }
  const tweetEl = e.target.closest('.tweet');
  if (tweetEl && tweetEl.dataset.tweetUrl) {
    window.open(tweetEl.dataset.tweetUrl, '_blank');
  }
});

// Focus tracking for keyboard shortcuts
document.getElementById('timeline').addEventListener('mouseover', function(e) {
  const tweetEl = e.target.closest('.tweet');
  if (!tweetEl) return;
  if (focusedTweetUrl) {
    const prev = document.querySelector('.tweet.ann-focused');
    if (prev) prev.classList.remove('ann-focused');
  }
  focusedTweetUrl = tweetEl.dataset.tweetUrl || null;
  if (focusedTweetUrl) tweetEl.classList.add('ann-focused');
});

// Keyboard shortcuts: 1-7 toggle, 0 clear, j/k nav, Enter confirm, ? help
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // ? help overlay
  if (e.key === '?') {
    document.getElementById('shortcut-overlay').classList.toggle('visible');
    return;
  }
  // j/k navigation between tweets
  if (e.key === 'j' || e.key === 'k') {
    const tweets = Array.from(document.querySelectorAll('.tweet[data-tweet-url]'));
    if (tweets.length === 0) return;
    const currentIdx = focusedTweetUrl ? tweets.findIndex(el => el.dataset.tweetUrl === focusedTweetUrl) : -1;
    let nextIdx;
    if (e.key === 'j') {
      nextIdx = currentIdx < tweets.length - 1 ? currentIdx + 1 : currentIdx;
    } else {
      nextIdx = currentIdx > 0 ? currentIdx - 1 : 0;
    }
    const prev = document.querySelector('.tweet.ann-focused');
    if (prev) prev.classList.remove('ann-focused');
    const next = tweets[nextIdx];
    focusedTweetUrl = next.dataset.tweetUrl;
    next.classList.add('ann-focused');
    next.scrollIntoView({ behavior: 'smooth', block: 'center' });
    e.preventDefault();
    return;
  }
  // Enter: mark as annotated and move to next
  if (e.key === 'Enter' && focusedTweetUrl) {
    const tweets = Array.from(document.querySelectorAll('.tweet[data-tweet-url]'));
    const currentIdx = tweets.findIndex(el => el.dataset.tweetUrl === focusedTweetUrl);
    const current = tweets[currentIdx];
    if (current) current.style.opacity = '0.6';
    if (currentIdx < tweets.length - 1) {
      const prev = document.querySelector('.tweet.ann-focused');
      if (prev) prev.classList.remove('ann-focused');
      const next = tweets[currentIdx + 1];
      focusedTweetUrl = next.dataset.tweetUrl;
      next.classList.add('ann-focused');
      next.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    e.preventDefault();
    return;
  }
  if (!focusedTweetUrl) return;
  const num = parseInt(e.key);
  if (isNaN(num)) return;
  if (num === 0) {
    clearAllAnn(focusedTweetUrl);
    const focused = document.querySelector('.tweet.ann-focused');
    if (focused) {
      focused.querySelectorAll('.ann-btn').forEach(btn => updateAnnButton(btn, focusedTweetUrl));
    }
    return;
  }
  const cat = ANN_CATEGORIES.find(c => c.num === num);
  if (!cat) return;
  toggleAnnCategory(focusedTweetUrl, cat.key);
  const focused = document.querySelector('.tweet.ann-focused');
  if (focused) {
    focused.querySelectorAll('.ann-btn').forEach(btn => updateAnnButton(btn, focusedTweetUrl));
  }
});

function updateAnnButton(btn, url) {
  const catKey = btn.dataset.catKey;
  const sel = getAnnCategories(url).includes(catKey);
  const cat = ANN_CATEGORIES.find(c => c.key === catKey);
  if (sel) {
    btn.classList.add('selected');
    btn.innerHTML = '<span class="shortcut-hint">' + cat.num + '</span>✓ ' + cat.label;
  } else {
    btn.classList.remove('selected');
    btn.innerHTML = '<span class="shortcut-hint">' + cat.num + '</span>' + cat.label;
  }
}

function updateAnnStats() {
  const total = allTweets.length;
  const annotated = Object.keys(annData).filter(url => {
    const d = annData[url];
    return d && d.human_categories && d.human_categories.length > 0;
  }).length;
  const el = document.getElementById('ann-stats');
  if (el) el.textContent = 'アノテーション: ' + annotated + '/' + total + '件';
  const fill = document.getElementById('ann-progress-fill');
  if (fill) fill.style.width = (total > 0 ? (annotated / total * 100) : 0) + '%';
}

function exportAnnotations() {
  const output = JSON.parse(JSON.stringify(annData));
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  a.href = url;
  a.download = 'human_annotations_' + dateStr + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

loadData();
</script>
