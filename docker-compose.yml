version: '3.8'

services:
  xstock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock

    # ディスプレイ設定（GUIブラウザ表示用）
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY

    # ボリュームマウント
    volumes:
      # ソースコード（開発時のホットリロード用）
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./core:/app/core:ro
      - ./extensions:/app/extensions:ro
      - ./configs:/app/configs:ro

      # データ永続化
      - ./output:/app/output
      - ./data:/app/data
      - ./models:/app/models

      # ブラウザプロファイル（ログイン状態を保持）
      - ./x_profile:/app/x_profile

      # macOS用: XQuartz経由でGUI表示
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    # ネットワーク設定
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # インタラクティブモード（セットアップ時に必要）
    stdin_open: true
    tty: true

    # セキュリティ設定（Chromium用）
    security_opt:
      - seccomp:./docker/chromium-seccomp.json

    # 共有メモリ増加（Chromium用）
    shm_size: '2gb'

  # セットアップ用サービス（初回ログイン時に使用）
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xstock-setup

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - TZ=Asia/Tokyo
      - ANTHROPIC_API_KEY

    volumes:
      - ./collector:/app/collector:ro
      - ./scripts:/app/scripts:ro
      - ./core:/app/core:ro
      - ./extensions:/app/extensions:ro
      - ./configs:/app/configs:ro
      - ./x_profile:/app/x_profile
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    security_opt:
      - seccomp:./docker/chromium-seccomp.json
    shm_size: '2gb'

    command: python scripts/setup_profile.py

    profiles:
      - setup  # docker-compose --profile setup up で起動
